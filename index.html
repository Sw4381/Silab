<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 지능 연구실</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="photo.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <!-- 헤더 -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img class="logo-picture" src="./image.png" alt="보안 지능 연구실 로고">
            </a>
        </div>
        <nav class="menu">
            <a href="index.html" class="active"><i class="fas fa-graduation-cap"></i> Home</a>
            <a href="./members.html"><i class="fas fa-users"></i> Members</a>
            <a href="./research.html"><i class="fas fa-flask"></i> Research</a>
            <a href="./projects.html"><i class="fas fa-file-alt"></i> Projects</a>
            <a href="./Publication.html"><i class="fas fa-copy"></i> Publications</a>
            <a href="./photo.html"><i class="fas fa-image"></i> Other Activities</a>
        </nav>

        <div class="auth-section">
            <div class="user-info" id="userInfo" style="display: none;">
                <i class="fas fa-user"></i>
                <span id="userName"></span>
            </div>
            <button class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                로그인
            </button>
            <button class="logout-btn" id="logoutBtn" style="display: none;">
                <i class="fas fa-sign-out-alt"></i>
                로그아웃
            </button>
        </div>
    </header>

    <!-- Firebase 로그인 모달 -->
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <span class="login-close" id="loginClose">&times;</span>
            <form class="login-form" id="loginForm">
                <h2><i class="fab fa-firefox"></i> 연구실 로그인</h2>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="example@gachon.ac.kr">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-submit">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
                <div class="login-help">연구실 멤버만 접근 가능합니다.</div>
            </form>
        </div>
    </div>

    <!-- 환영 텍스트 수정 모달 -->
    <div id="welcomeEditModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto; align-items:center; justify-content:center;">
        <div style="background:white; max-width:550px; width:90%; margin:40px auto; padding:30px; border-radius:12px;">
            <h3><i class="fas fa-edit"></i> 홈 텍스트 수정</h3>
            <form id="welcomeForm">
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="welcomeTitle" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>소개 문구 (한 줄에 하나씩)</label>
                    <textarea id="welcomeBullets" rows="4" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                </div>
                <div class="form-group">
                    <label>모집 제목</label>
                    <input type="text" id="welcomeRecruitTitle" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>모집 내용</label>
                    <textarea id="welcomeRecruitText" rows="3" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                    <button type="button" class="cancel-btn" id="welcomeModalClose">취소</button>
                    <button type="submit" class="submit-btn" id="welcomeSaveBtn"><i class="fas fa-save"></i> 저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 슬라이드 추가 모달 -->
    <div id="slideAddModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto; align-items:center; justify-content:center;">
        <div style="background:white; max-width:480px; width:90%; margin:40px auto; padding:30px; border-radius:12px;">
            <h3><i class="fas fa-image"></i> 슬라이드 추가</h3>
            <form id="slideAddForm">
                <div class="form-group">
                    <label>이미지 *</label>
                    <input type="file" id="slideFile" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>사진 설명 (alt text)</label>
                    <input type="text" id="slideAlt" placeholder="예: 2025 워크숍" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;">
                </div>
                <div id="slideUploadProgress" style="display:none;margin-bottom:10px;">
                    <div style="background:#e9ecef;border-radius:4px;overflow:hidden;">
                        <div id="slideProgressBar" style="height:6px;background:#3b6cf7;width:0%;transition:width 0.3s;"></div>
                    </div>
                    <small>이미지 업로드 중...</small>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                    <button type="button" class="cancel-btn" id="slideAddClose">취소</button>
                    <button type="submit" class="submit-btn" id="slideAddBtn"><i class="fas fa-plus"></i> 추가</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 연구카드 추가/수정 모달 -->
    <div id="cardModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto; align-items:center; justify-content:center;">
        <div style="background:white; max-width:500px; width:90%; margin:40px auto; padding:30px; border-radius:12px;">
            <h3 id="cardModalTitle">연구카드 추가</h3>
            <form id="cardForm">
                <div class="form-group">
                    <label>제목 *</label>
                    <input type="text" id="cardTitle" required placeholder="예: Autonomous AI" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>부제목 *</label>
                    <input type="text" id="cardSubtitle" required placeholder="예: (Security by AI)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>색상 테마</label>
                    <select id="cardColor" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;">
                        <option value="blue">파랑 🔬</option>
                        <option value="red">빨강 🛡️</option>
                        <option value="green">초록 📋</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>항목 (한 줄에 하나씩)</label>
                    <textarea id="cardItems" rows="4" placeholder="항목1&#10;항목2&#10;항목3" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                    <button type="button" class="cancel-btn" id="cardModalClose">취소</button>
                    <button type="submit" class="submit-btn" id="cardSaveBtn"><i class="fas fa-save"></i> 저장</button>
                </div>
            </form>
        </div>
    </div>

    <div class="container">

        <!-- 관리자 패널 -->
        <div class="admin-panel" id="homeAdminPanel" style="display:none;">
            <h3><i class="fas fa-tools"></i> 홈 관리</h3>
            <div class="admin-buttons">
                <button class="admin-btn" id="editWelcomeBtn"><i class="fas fa-pen"></i> 텍스트 수정</button>
                <button class="admin-btn" id="addSlideBtn"><i class="fas fa-image"></i> 슬라이드 추가</button>
                <button class="admin-btn" id="addCardBtn"><i class="fas fa-plus"></i> 연구카드 추가</button>
                <button class="admin-btn edit" id="homeEditModeBtn"><i class="fas fa-edit"></i> 수정 모드 토글</button>
                <button class="admin-btn delete" id="homeDeleteModeBtn"><i class="fas fa-trash"></i> 삭제 모드 토글</button>
            </div>
        </div>

        <!-- 메인 섹션 -->
        <div class="main-section">
            <div class="main-image">
                <div id="slider-wrapper" style="position:relative;">
                    <div class="slider">
                        <div class="slides" id="slides-container"></div>
                    </div>
                    <div class="slider-dots" id="slider-dots"></div>
                </div>
            </div>

            <!-- 환영 텍스트 (JS로 렌더링) -->
            <div class="main-text" id="main-text"></div>
        </div>

        <!-- 주요 연구분야 섹션 -->
        <section class="research-section">
            <h2 class="section-title">주요 연구분야</h2>
            <div class="research-grid" id="research-grid"></div>
        </section>

        <!-- 푸터 -->
        <footer>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:kinjecs0@gmail.com">kinjecs0@gmail.com</a>
                </div>
                <div class="divider"></div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>가천대학교 스마트보안학과</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="index.js"></script>
</body>
</html>
