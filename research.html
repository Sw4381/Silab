<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research - 보안 지능 연구실</title>
    <link rel="icon" href="./image.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="common.css?v=6">
    <link rel="stylesheet" href="research.css?v=6">
    <link rel="stylesheet" href="photo.css?v=6">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <!-- 헤더 -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img class="logo-picture" src="./image.png" alt="보안 지능 연구실 로고">
            </a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
            <span></span><span></span><span></span>
        </button>
        <nav class="menu">
            <a href="index.html"><i class="fas fa-graduation-cap"></i> Home</a>
            <a href="./members.html"><i class="fas fa-users"></i> Members</a>
            <a href="./research.html" class="active"><i class="fas fa-flask"></i> Research</a>
            <a href="./projects.html"><i class="fas fa-file-alt"></i> Projects</a>
            <a href="./Publication.html"><i class="fas fa-copy"></i> Publications</a>
            <a href="./photo.html"><i class="fas fa-image"></i> Other Activities</a>
            <a href="./performance.html" class="nav-perf" style="display:none;"><i class="fas fa-chart-line"></i> Performance</a>
            <a href="./budget.html" class="nav-perf" style="display:none;"><i class="fas fa-coins"></i> 예산</a>        </nav>

        <div class="auth-section">
            <div class="user-info" id="userInfo" style="display: none;">
                <i class="fas fa-user"></i>
                <span id="userName"></span>
            </div>
            <button class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                로그인
            </button>
            <button class="logout-btn" id="logoutBtn" style="display: none;">
                <i class="fas fa-sign-out-alt"></i>
                로그아웃
            </button>
        </div>
    </header>

    <!-- Firebase 로그인 모달 -->
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <span class="login-close" id="loginClose">&times;</span>
            <form class="login-form" id="loginForm">
                <h2><i class="fab fa-firefox"></i> 연구실 로그인</h2>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="example@gachon.ac.kr">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-submit">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
                <div class="login-help">
                    연구실 멤버만 접근 가능합니다.
                </div>
            </form>
        </div>
    </div>

    <div class="container">

        <!-- 관리자 패널 -->
        <div class="admin-panel" id="researchAdminPanel" style="display:none;">
            <h3><i class="fas fa-tools"></i> 연구 관리</h3>
            <div class="admin-buttons">
                <button class="admin-btn" id="addResearchBtn"><i class="fas fa-plus"></i> 연구 추가</button>
                <button class="admin-btn edit" id="researchEditModeBtn"><i class="fas fa-edit"></i> 수정 모드 토글</button>
                <button class="admin-btn delete" id="researchDeleteModeBtn"><i class="fas fa-trash"></i> 삭제 모드 토글</button>
            </div>
        </div>

        <!-- 페이지 타이틀 -->
        <div class="page-header">
            <h1>Research Areas</h1>
            <p>보안 지능 연구실의 주요 연구 분야를 소개합니다</p>
        </div>

        <!-- 연구 카드 그리드 (동적 렌더링) -->
        <div class="research-container" id="research-container"></div>

        <!-- 상세 모달 (detail) -->
        <div id="researchModal" class="modal">
            <div class="modal-content">
                <span class="modal-close" onclick="closeResearchModal()">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>

        <!-- 연구 추가/수정 모달 -->
        <div id="researchModal2" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; overflow-y:auto;">
            <div style="background:white; max-width:700px; margin:40px auto; padding:30px; border-radius:12px;">
                <h3 id="researchModalTitle">연구 추가</h3>
                <form id="researchForm">
                    <div class="form-group">
                        <label>제목 *</label>
                        <input type="text" id="researchTitle" required placeholder="연구 제목" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;box-sizing:border-box;">
                    </div>
                    <div class="form-group">
                        <label>부제목 (빨간색 강조 텍스트) *</label>
                        <textarea id="researchSubtitle" rows="2" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>목표 태그 (한 줄에 하나씩)</label>
                        <textarea id="researchGoals" rows="3" placeholder="LLM 취약성 평가&#10;LLM jailbreaking" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>카드 요약 항목 (한 줄에 하나씩, 3개 권장)</label>
                        <textarea id="researchSummary" rows="4" placeholder="항목1&#10;항목2&#10;항목3" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>AS-IS 항목 (한 줄에 하나씩)</label>
                            <textarea id="researchAsIs" rows="4" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>TO-BE 항목 (한 줄에 하나씩)</label>
                            <textarea id="researchToBe" rows="4" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>PROPOSED METHOD 항목 (한 줄에 하나씩)</label>
                        <textarea id="researchMethod" rows="5" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>연구 이미지</label>
                        <input type="file" id="researchImage" accept="image/*">
                        <div id="researchImagePreview" style="margin-top:8px;"></div>
                    </div>
                    <div id="researchUploadProgress" style="display:none;margin-bottom:10px;">
                        <div style="background:#e9ecef;border-radius:4px;overflow:hidden;">
                            <div id="researchProgressBar" style="height:6px;background:#3b6cf7;width:0%;transition:width 0.3s;"></div>
                        </div>
                        <small>이미지 업로드 중...</small>
                    </div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                        <button type="button" class="cancel-btn" id="researchModalClose">취소</button>
                        <button type="submit" class="submit-btn" id="researchSaveBtn"><i class="fas fa-save"></i> 저장</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 푸터 -->
        <footer>
            <div class="footer-inner">
                <div class="footer-brand">
                    <img src="./image.png" alt="SILAB" class="footer-logo">
                    <div>
                        <span class="footer-lab-name">SILAB</span>
                        <span class="footer-lab-sub">보안 지능 연구실</span>
                    </div>
                </div>
                <div class="footer-info">
                    <div class="footer-info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>가천대학교 AI소프트웨어학부 스마트보안학과</span>
                    </div>
                </div>
                <div class="footer-copy">© 2025 SILAB · Gachon University</div>
            </div>
        </footer>
    </div>

    <script src="config.js?v=6"></script>
    <script src="common.js?v=6"></script>
    <script src="research.js?v=6"></script>
</body>
</html>
